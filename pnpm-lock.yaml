lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^6.0.2
        version: 6.0.2

  packages/adapter-utils: {}

  packages/claude-adapter:
    dependencies:
      '@fixy/adapter-utils':
        specifier: workspace:*
        version: link:../adapter-utils

  packages/cli:
    dependencies:
      '@fixy/adapter-utils':
        specifier: workspace:*
        version: link:../adapter-utils
      '@fixy/core':
        specifier: workspace:*
        version: link:../core

  packages/codex-adapter:
    dependencies:
      '@fixy/adapter-utils':
        specifier: workspace:*
        version: link:../adapter-utils

  packages/core: {}

packages:

  typescript@6.0.2:
    resolution: {integrity: sha512-bGdAIrZ0wiGDo5l8c++HWtbaNCWTS4UTv7RaTH/ThVIgjkveJt83m74bBHMJkuCbslY8ixgLBVZJIOiQlQTjfQ==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  typescript@6.0.2: {}
